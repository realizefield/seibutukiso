<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>生物基礎：②原核細胞の構造と構造の比較</title>
    <style>
        :root { --primary-color: #2c3e50; --bg-color: #f8f9fa; --drop-zone-bg: #fff9c4; --line-green: #06C755; }
        body { font-family: sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; overflow-x: hidden; }
        
        /* 固定ヘッダー */
        .sticky-header { 
            position: sticky; top: 0; background: var(--bg-color); 
            padding: 10px 0; z-index: 1000; border-bottom: 2px solid #ddd; 
        }

        /* ナビゲーションボタン */
        .page-nav {
            max-width: 1050px;
            margin: 0 auto 10px;
            display: flex;
            justify-content: center;
            gap: 5px;
            flex-wrap: wrap;
        }
        .nav-btn {
            text-decoration: none;
            background: #7f8c8d;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: bold;
            transition: 0.2s;
        }
        .nav-btn:hover { background: #34495e; }
        .nav-btn.active { background: #2c3e50; border: 2px solid #f1c40f; }

        .challenge-panel { 
            background: #333; color: #fff; padding: 10px; border-radius: 8px; 
            display: flex; justify-content: space-around; align-items: center; 
            max-width: 1050px; margin: 0 auto 10px; 
        }
        .timer { font-size: 1.5em; color: #f1c40f; font-family: monospace; }
        
        /* 音声コントロールエリア */
        .audio-summary-area {
            background: #fff3e0; padding: 15px; border-radius: 8px; margin: 10px auto 10px;
            display: flex; align-items: center; justify-content: space-between;
            border: 1px solid #ffe0b2; max-width: 1050px;
        }
        .speaker-btn-large { 
            background: #e67e22; color: white; border: none; cursor: pointer; 
            padding: 10px 25px; border-radius: 30px; font-weight: bold;
            display: flex; align-items: center; gap: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .speaker-btn-large.playing { background: #c0392b; }
        .volume-control { display: flex; align-items: center; gap: 10px; }
        input[type="range"] { cursor: pointer; width: 150px; }

        /* 語群コンテナ */
        .word-bank-container { 
            background: #eee; padding: 15px; border-radius: 8px; border: 1px solid #ccc; 
            max-width: 1050px; margin: 0 auto; 
        }
        .word-bank { display: flex; flex-wrap: wrap; gap: 8px; min-height: 40px; }
        .drag-item { 
            background: #fff; color: #ff0000; border: 1px solid #333; padding: 4px 12px; 
            cursor: pointer; font-weight: bold; font-size: 0.9em; 
        }
        .drag-item.selected { background: #f1c40f; color: #333; }

        .container { max-width: 1050px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; }
        .section-box { margin-bottom: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .section-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; border-left: 6px solid #2c3e50; padding-left: 10px; }

        /* ドロップゾーン設定 */
        .drop-zone-inline { 
            display: inline-block; min-width: 120px; height: 1.6em; 
            background: var(--drop-zone-bg); border: 1px solid #333; 
            vertical-align: middle; cursor: pointer; text-align: center;
            font-weight: bold; color: #ff0000; padding: 2px 5px;
            white-space: nowrap;
        }
        .drop-zone-inline.symbol { min-width: 40px; }
        .drop-zone-inline.correct { background: #d4edda !important; border: 2px solid #28a745 !important; color: #155724; }
        .drop-zone-inline.wrong { background: #f8d7da !important; border: 2px solid #dc3545 !important; }

        /* 原核細胞図 */
        .genkaku-detail-box { position: relative; width: 450px; height: 350px; margin: 20px auto; border: 1px solid #eee; background: #fff; }
        .genkaku-img { width: 300px; display: block; margin: 60px auto; }
        
        /* 300px画像への正確な座標 */
        .pos-ribo { position: absolute; top: 20px; left: 10px; } 
        .pos-nuc-like { position: absolute; top: 10px; left: 180px; }
        .pos-cap { position: absolute; top: 40px; left: 300px; } 
        .pos-flag { position: absolute; top: 160px; right: 10px; } 
        .pos-wall-g { position: absolute; bottom: 20px; left: 180px; } 
        .pos-mem-g { position: absolute; bottom: 20px; left: 10px; } 
        .pos-dna-g { position: absolute; bottom: 20px; left: 300px; } 

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 12px; text-align: left; }
        th { background: #f2f2f2; text-align: center; }
        td.center { text-align: center; }

        .line-float-btn {
            position: fixed; bottom: 30px; right: 30px; background: var(--line-green); color: white;
            width: 75px; height: 75px; border-radius: 50%; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-decoration: none; font-weight: bold;
            font-size: 11px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 2000; transition: 0.2s;
        }
        .line-float-btn:hover { transform: scale(1.1); }

        .controls { text-align: center; margin-top: 30px; padding-bottom: 100px; }
        .main-btn { padding: 15px 30px; font-size: 1.1rem; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; color: white; margin: 0 10px; }
        
        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
    </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="sticky-header">
    <nav class="page-nav">
        <a href="saibou1.html" class="nav-btn">①原核・真核細胞</a>
        <a href="saibou1-1.html" class="nav-btn">①-1【演習】</a>
        <a href="saibou2.html" class="nav-btn active">②原核細胞の構造</a>
        <a href="saibou3.html" class="nav-btn">③代謝・同化・異化</a>
        <a href="saibou4.html" class="nav-btn">④ATPとADP</a>
        <a href="saibou4-1.html" class="nav-btn">④-1【演習】</a>
    </nav>

    <div class="challenge-panel">
        <div>TIME: <span id="timerDisplay" class="timer">00:00.0</span></div>
        <div id="recordDisplay" style="font-size:0.8em;">記録なし</div>
    </div>
    <div class="audio-summary-area">
        <button id="playBtn" class="speaker-btn-large" onclick="toggleAudio()">
            <span id="btnIcon">📢</span> <span id="btnText">解説を聴く</span>
        </button>
        <div class="volume-control">
            <span style="font-size:0.8em; font-weight:bold; color:#e67e22;">音量</span>
            <input type="range" id="volSlider" min="0" max="1" step="0.01" value="1">
            <span id="volNum" style="font-size:0.8em; min-width:35px;">100%</span>
        </div>
    </div>
    <div class="word-bank-container"><div id="wordBank" class="word-bank">「チャレンジ開始」をクリックしてください。</div></div>
</div>

<div class="container">
    <div class="section-box">
        <div class="section-title">2. 原核細胞の構造</div>
        <p style="background: #fff; border: 1px solid #333; padding: 25px; line-height: 2.2; font-size: 1.1rem;">
            原核細胞は<div class="drop-zone-inline" data-ans="核膜" onclick="zCl(this)"></div>，<div class="drop-zone-inline" data-ans="ミトコンドリア" onclick="zCl(this)"></div>，<br>
            葉緑体をもちません。しかし<div class="drop-zone-inline" data-ans="細胞壁" onclick="zCl(this)"></div>があります。
        </p>
    </div>

    <div class="section-box">
        <div class="section-title">2-2. 原核細胞の各部構造</div>
        <div class="genkaku-detail-box">
            <img src="saibou01.png" class="genkaku-img" alt="原核細胞詳細">
            
        </div>
        <p style="font-size: 0.9em; color: #555;">※リボソーム：タンパク質の合成を行う。<br>※核様体：核がなく DNA がむき出しの状態。</p>
    </div>

    <div class="section-box">
        <div class="section-title">問）次は原核細胞内にある構造の有無の表です。</div>
        <table>
            <tr><th rowspan="2">構造体</th><th rowspan="2">原核細胞</th><th colspan="2">真核細胞</th></tr>
            <tr><th>動物</th><th>植物</th></tr>
            <tr><td class="center">DNA</td><td class="center">＋</td><td class="center">＋</td><td class="center">＋</td></tr>
            <tr><td class="center">細胞膜</td><td class="center">＋</td><td class="center">＋</td><td class="center">＋</td></tr>
            <tr><td class="center">細胞壁</td><td class="center"><div class="drop-zone-inline symbol" data-ans="＋" onclick="zCl(this)"></div></td><td class="center">ー</td><td class="center">＋</td></tr>
            <tr><td class="center">核膜</td><td class="center"><div class="drop-zone-inline symbol" data-ans="ー" onclick="zCl(this)"></div></td><td class="center">＋</td><td class="center">＋</td></tr>
            <tr><td class="center">ミトコンドリア</td><td class="center"><div class="drop-zone-inline symbol" data-ans="ー" onclick="zCl(this)"></div></td><td class="center"><div class="drop-zone-inline symbol" data-ans="＋" onclick="zCl(this)"></div></td><td class="center"><div class="drop-zone-inline symbol" data-ans="＋" onclick="zCl(this)"></div></td></tr>
            <tr><td class="center">葉緑体</td><td class="center"><div class="drop-zone-inline symbol" data-ans="ー" onclick="zCl(this)"></div></td><td class="center">ー</td><td class="center">＋</td></tr>
        </table>
    </div>

    <div class="controls">
        <button class="main-btn challenge-btn" onclick="stCh()" style="background:#e67e22;">チャレンジ開始！</button>
        <button class="main-btn check-btn" onclick="chAn()" style="background:#27ae60;">答え合わせ</button>
        <button class="main-btn reset-btn" onclick="shMo()" style="background:#95a5a6;">お手本に戻す</button>
    </div>
</div>

<audio id="mainAudio" src="saibou2.wav"></audio>

<script>
    const words = ["核膜","ミトコンドリア","細胞壁","リボソーム","核様体","莢膜","ベン(鞭)毛","細胞膜","DNA","＋","ー"];
    let sT, tI, isR = false, sW = null, animationId = null;
    const audio = document.getElementById('mainAudio');
    const volSlider = document.getElementById('volSlider');
    const volNum = document.getElementById('volNum');
    const playBtn = document.getElementById('playBtn');

    function toggleAudio() {
        if (audio.paused) { audio.play(); updatePlayUI(true); } else { audio.pause(); updatePlayUI(false); }
    }
    audio.onended = () => updatePlayUI(false);
    function updatePlayUI(isPlaying) {
        document.getElementById('btnIcon').innerText = isPlaying ? "⏸" : "📢";
        document.getElementById('btnText').innerText = isPlaying ? "停止中" : "解説を聴く";
        playBtn.classList.toggle('playing', isPlaying);
    }
    volSlider.addEventListener('input', (e) => {
        audio.volume = e.target.value;
        volNum.innerText = Math.round(e.target.value * 100) + "%";
    });

    function zCl(z){ if(isR && sW){ z.innerText = sW.innerText; sW.classList.remove('selected'); sW = null; } }
    
    function stCh(){
        stopCnf(); 
        isR = true; sT = Date.now();
        if(tI) clearInterval(tI);
        tI = setInterval(()=> { document.getElementById('timerDisplay').innerText = ((Date.now()-sT)/1000).toFixed(1)+"s"; }, 100);
        document.querySelectorAll('.drop-zone-inline').forEach(z=>{ z.innerText=""; z.classList.remove('correct','wrong'); });
        const b = document.getElementById('wordBank'); b.innerHTML = "";
        [...new Set(words)].sort(()=>Math.random()-0.5).forEach(w=>{
            const d = document.createElement('div'); d.className='drag-item'; d.innerText=w;
            d.onclick=function(){ if(sW)sW.classList.remove('selected'); sW=this; this.classList.add('selected'); };
            b.appendChild(d);
        });
    }

    function chAn(){
        let ok=true;
        document.querySelectorAll('.drop-zone-inline').forEach(z=>{
            if(z.innerText.trim()===z.getAttribute('data-ans')) z.classList.add('correct');
            else { z.classList.add('wrong'); ok=false; }
        });
        if(ok && isR){ clearInterval(tI); isR=false; startCnf(); }
    }

    function shMo(){
        stopCnf(); 
        if(tI) clearInterval(tI);
        isR = false;
        document.querySelectorAll('.drop-zone-inline').forEach(z=>{ z.innerText=z.getAttribute('data-ans'); z.classList.remove('correct','wrong'); });
        document.getElementById('wordBank').innerHTML = "お手本表示中です。";
    }

    const cvs = document.getElementById("confetti-canvas");
    const ctx = cvs.getContext("2d");
    let pts = [];
    function startCnf() {
        cvs.width = window.innerWidth; cvs.height = window.innerHeight;
        pts = [];
        for (let i = 0; i < 150; i++) {
            pts.push({ x: Math.random() * cvs.width, y: Math.random() * cvs.height - cvs.height, s: Math.random() * 8 + 4, c: `hsl(${Math.random() * 360},70%,70%)`, sp: Math.random() * 3 + 2 });
        }
        updateCnf();
    }
    function updateCnf() {
        ctx.clearRect(0, 0, cvs.width, cvs.height);
        pts.forEach(p => { p.y += p.sp; ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, p.s, p.s); if (p.y > cvs.height) p.y = -20; });
        animationId = requestAnimationFrame(updateCnf);
    }
    function stopCnf() {
        if (animationId) cancelAnimationFrame(animationId);
        animationId = null;
        ctx.clearRect(0, 0, cvs.width, cvs.height);
    }
    shMo();
</script>
</body>
</html>
